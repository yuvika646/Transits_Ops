services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: transitops
      POSTGRES_PASSWORD: transitops
    ports:
      - '55432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U transitops -d transitops']
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: transitops
      MINIO_ROOT_PASSWORD: transitops-minio-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ['/bin/sh', '-c']
    command:
      [
        'until mc alias set local http://minio:9000 transitops transitops-minio-secret; do sleep 2; done; mc mb --ignore-existing local/transitops-documents',
      ]
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'
  api:
    profiles: ['application']
    build: .
    env_file: .env
    command: ['bun', 'run', 'start']
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
  worker:
    profiles: ['application']
    build: .
    env_file: .env
    command: ['bun', 'run', 'worker']
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres-data:
  minio-data:
